<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loja de Carros</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      color: #38bdf8;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 10px;
      width: 280px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin: 0 0 10px;
      color: #38bdf8;
    }

    .card button {
      background: #38bdf8;
      border: none;
      padding: 10px;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
    }

    .card button:hover {
      background: #0ea5e9;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #1e293b;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>🚗 Loja de Carros Online</h1>
  <p>Escolha seu carro dos sonhos</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?car,sport" />
    <div class="card-content">
      <h3>Carro Esportivo</h3>
      <p>Velocidade e estilo em um só carro.</p>
      <button onclick="comprar('Carro Esportivo')">Comprar</button>
    </div>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?car,luxury" />
    <div class="card-content">
      <h3>Carro Luxo</h3>
      <p>Conforto e elegância premium.</p>
      <button onclick="comprar('Carro Luxo')">Comprar</button>
    </div>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?car,suv" />
    <div class="card-content">
      <h3>SUV Moderno</h3>
      <p>Ideal para família e viagens.</p>
      <button onclick="comprar('SUV Moderno')">Comprar</button>
    </div>
  </div>

</div>

<footer>
  <p>© 2026 Loja de Carros - Todos os direitos reservados</p>
</footer>

<script>
  function comprar(nome) {
    alert("Você escolheu: " + nome + " 🚗");
  }
</script>

</body>
</html>
