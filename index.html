<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>1001 Itens Explicados</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  background: #111a2e;
}

h1 {
  color: #4cc9f0;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #16213e;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

svg {
  width: 100%;
  height: 120px;
  background: #0f172a;
  border-radius: 8px;
}

.title {
  color: #4cc9f0;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <h1>📘 Site dos 1001 Itens</h1>
  <p>Explicações + desenhos automáticos via código</p>
</header>

<div class="container" id="container"></div>

<script>
// 🎯 Função para gerar "desenho" simples
function desenho(i) {
  const cor = ["#4cc9f0", "#f72585", "#b5179e", "#7209b7", "#4361ee"][i % 5];

  return `
  <svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="${20 + (i % 30)}" fill="${cor}" />
    <rect x="10" y="10" width="20" height="20" fill="white" opacity="0.3"/>
  </svg>
  `;
}

// 📦 Criação dos 1001 itens
const container = document.getElementById("container");

for (let i = 1; i <= 1001; i++) {

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    ${desenho(i)}
    <div class="title">Item ${i}</div>
    <p>Explicação do item ${i}: este é um elemento automático gerado pelo sistema, com lógica de programação.</p>
  `;

  container.appendChild(div);
}
</script>

</body>
</html>
