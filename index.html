<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sport Sneakers - Loja de Tênis</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .filters {
      text-align: center;
      margin-bottom: 20px;
    }

    .filters button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      cursor: pointer;
      background: #222;
      color: white;
      border-radius: 5px;
    }

    .filters button:hover {
      background: #555;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
    }

    .price {
      color: green;
      font-weight: bold;
      margin: 10px 0;
    }

    .btn {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: #444;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      background: #111;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h1>Sport Sneakers</h1>
  <p>Os melhores tênis esportivos para você</p>
</header>

<div class="container">

  <div class="filters">
    <button onclick="filterProducts('all')">Todos</button>
    <button onclick="filterProducts('corrida')">Corrida</button>
    <button onclick="filterProducts('basquete')">Basquete</button>
    <button onclick="filterProducts('casual')">Casual</button>
  </div>

  <div class="grid" id="productGrid">

    <div class="card" data-category="corrida">
      <img src="https://images.unsplash.com/photo-1600269452121-4f2416e55c28" />
      <h3>Tênis Running Pro</h3>
      <p class="price">R$ 299,90</p>
      <button class="btn">Comprar</button>
    </div>

    <div class="card" data-category="basquete">
      <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db" />
      <h3>Basket Force X</h3>
      <p class="price">R$ 399,90</p>
      <button class="btn">Comprar</button>
    </div>

    <div class="card" data-category="casual">
      <img src="https://images.unsplash.com/photo-1528701800489-20be3c2ea4c9" />
      <h3>Street Casual One</h3>
      <p class="price">R$ 199,90</p>
      <button class="btn">Comprar</button>
    </div>

    <div class="card" data-category="corrida">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" />
      <h3>Speed Run 2.0</h3>
      <p class="price">R$ 349,90</p>
      <button class="btn">Comprar</button>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 Sport Sneakers - Todos os direitos reservados</p>
</footer>

<script>
  function filterProducts(category) {
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
      if (category === "all") {
        card.style.display = "block";
      } else {
        card.style.display = card.dataset.category === category ? "block" : "none";
      }
    });
  }
</script>

</body>
</html>
