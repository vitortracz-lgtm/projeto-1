<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bloco de Notas</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 700px;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

h1 {
  text-align: center;
  color: #38bdf8;
}

textarea {
  width: 100%;
  height: 300px;
  padding: 15px;
  border: none;
  outline: none;
  resize: none;
  border-radius: 8px;
  font-size: 16px;
  background: #0b1220;
  color: white;
}

.buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

button {
  flex: 1;
  margin: 5px;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.save {
  background: #38bdf8;
}

.clear {
  background: #ef4444;
  color: white;
}

button:hover {
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
  <h1>📝 Bloco de Notas</h1>

  <textarea id="note" placeholder="Escreva suas anotações aqui..."></textarea>

  <div class="buttons">
    <button class="save" onclick="salvar()">Salvar</button>
    <button class="clear" onclick="limpar()">Limpar</button>
  </div>
</div>

<script>
// Carregar nota salva
window.onload = function () {
  document.getElementById("note").value =
    localStorage.getItem("nota") || "";
};

// Salvar nota automaticamente
document.getElementById("note").addEventListener("input", function () {
  localStorage.setItem("nota", this.value);
});

// Botão salvar
function salvar() {
  localStorage.setItem("nota", document.getElementById("note").value);
  alert("Nota salva com sucesso!");
}

// Botão limpar
function limpar() {
  document.getElementById("note").value = "";
  localStorage.removeItem("nota");
}
</script>

</body>
</html>
