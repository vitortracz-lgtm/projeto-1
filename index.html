<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milagres Eucarísticos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      color: #333;
    }

    header {
      background: #6a1b9a;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .intro {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card h3 {
      margin-top: 0;
      color: #6a1b9a;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #222;
      color: white;
      margin-top: 30px;
    }

    button {
      background: #6a1b9a;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
    }

    button:hover {
      background: #4a1170;
    }
  </style>
</head>

<body>

<header>
  <h1>Milagres Eucarísticos</h1>
  <p>Conheça alguns dos mais conhecidos milagres da Eucaristia</p>
</header>

<div class="container">

  <div class="intro">
    <p>Clique no botão para ver os milagres registrados na história da Igreja.</p>
    <button onclick="mostrarMilagres()">Mostrar Milagres</button>
  </div>

  <div class="grid" id="grid"></div>

</div>

<footer>
  © 2026 - Site de Milagres Eucarísticos
</footer>

<script>
  const milagres = [
    {
      nome: "Milagre de Lanciano",
      pais: "Itália",
      descricao: "Um dos mais antigos milagres eucarísticos conhecidos, onde a hóstia se transformou em carne e o vinho em sangue."
    },
    {
      nome: "Milagre de Bolsena",
      pais: "Itália",
      descricao: "Durante uma missa, uma hóstia começou a sangrar, reforçando a fé na presença real de Cristo."
    },
    {
      nome: "Milagre de Santarém",
      pais: "Portugal",
      descricao: "Uma hóstia consagrada foi encontrada sangrando e preservada até hoje como relíquia."
    },
    {
      nome: "Milagre de Buenos Aires",
      pais: "Argentina",
      descricao: "Hóstias que se transformaram em tecido cardíaco foram estudadas cientificamente."
    },
    {
      nome: "Milagre de Tixtla",
      pais: "México",
      descricao: "Uma hóstia começou a liberar substância semelhante a sangue durante a exposição."
    }
  ];

  function mostrarMilagres() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    milagres.forEach(m => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${m.nome}</h3>
        <p><strong>País:</strong> ${m.pais}</p>
        <p>${m.descricao}</p>
      `;

      grid.appendChild(card);
    });
  }
</script>

</body>
</html>
